server:
  port: 8080

spring:
  application:
    name: quote-approval-workflow-shred
  datasource:
    url: jdbc:postgresql://localhost:5432/approval_db
    username: approval_user
    password: encrypted
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
    virtual-host: /
    connection-timeout: 60000
    requested-heartbeat: 60
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.xml

approval:
  queues:
    notifications: approval.notifications
    assignments: approval.assignments
    deadlines: approval.deadlines
  business-rules:
    max-processing-time-hours: 48
    high-priority-processing-time-hours: 24
    urgent-processing-time-hours: 12
    max-queue-capacity: 1000
    deadline-alert-hours-before: 6

logging:
  level:
    root: INFO
    ai.shreds: DEBUG
    org.springframework.amqp: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type: TRACE
  pattern:
    console: '%d{yyyy-MM-dd HH:mm:ss} - %msg%n'
    file: '%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n'
  file:
    name: logs/approval-workflow.log

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    export:
      prometheus:
        enabled: true