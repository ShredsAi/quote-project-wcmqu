server:
  port: 0

spring:
  application:
    name: quote-approval-workflow-shred-test
  datasource:
    url: jdbc:postgresql://localhost:5432/testdb
    username: test
    password: test
    driver-class-name: org.postgresql.Driver
    hikari:
      auto-commit: false
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
    virtual-host: /
    connection-timeout: 60000
    requested-heartbeat: 60
  liquibase:
    enabled: false
  security:
    user:
      password: ""
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration
      - org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration

approval:
  queues:
    notifications: approval.notifications.test
    assignments: approval.assignments.test
    deadlines: approval.deadlines.test
  business-rules:
    max-processing-time-hours: 48
    high-priority-processing-time-hours: 24
    urgent-processing-time-hours: 12
    max-queue-capacity: 1000
    deadline-alert-hours-before: 6

logging:
  level:
    root: INFO
    ai.shreds: DEBUG
    org.springframework.amqp: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type: TRACE
    org.testcontainers: DEBUG
  pattern:
    console: '%d{yyyy-MM-dd HH:mm:ss} - %msg%n'

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always